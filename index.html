<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento de Proyectos — PROINNOVATE</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --brand:#4f46e5;--brand-dk:#3730a3;--brand-lt:#eef2ff;--brand-md:#818cf8;
  --teal:#0891b2;--teal-lt:#ecfeff;
  --emerald:#059669;--emerald-lt:#ecfdf5;
  --amber:#d97706;--amber-lt:#fffbeb;
  --rose:#e11d48;--rose-lt:#fff1f2;
  --violet:#7c3aed;--violet-lt:#f5f3ff;
  --g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;
  --g400:#9ca3af;--g500:#6b7280;--g600:#4b5563;--g700:#374151;--g900:#111827;
  --bg:#f1f5f9;--white:#ffffff;--border:#e5e7eb;--border2:#d1d5db;
  --text:#111827;--text2:#4b5563;--text3:#9ca3af;
  --font:'Plus Jakarta Sans',system-ui,sans-serif;
  --r4:4px;--r6:6px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;
  --sh1:0 1px 3px rgba(0,0,0,.08);--sh2:0 4px 12px rgba(0,0,0,.08);--sh3:0 8px 24px rgba(0,0,0,.1);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;-webkit-font-smoothing:antialiased;}

/* LOADER */
#loader{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#1e1b4b,#3730a3,#4f46e5);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;transition:opacity .4s;}
#loader.off{opacity:0;pointer-events:none;}
.ld-title{font-size:2rem;font-weight:800;color:#fff;letter-spacing:-.03em;}
.ld-sub{font-size:.7rem;font-weight:600;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.18em;}
.ld-bar{width:160px;height:2px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}
.ld-fill{height:100%;background:linear-gradient(90deg,#a5b4fc,#c084fc);animation:ld 1.4s ease-in-out infinite;}
@keyframes ld{0%{width:0;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0;margin-left:100%}}
.ld-msg{font-size:.65rem;color:rgba(255,255,255,.3);}

/* TOPBAR */
.topbar{height:54px;background:var(--white);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:16px;padding:0 20px;position:sticky;top:0;z-index:100;box-shadow:var(--sh1);}
.brand{display:flex;align-items:center;gap:10px;padding-right:20px;border-right:1px solid var(--border);}
.brand-icon{width:30px;height:30px;background:var(--brand);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.brand-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:2.5;}
.brand-name{font-size:.88rem;font-weight:800;color:var(--g900);letter-spacing:-.02em;}
.brand-tag{font-size:.58rem;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.1em;}
.search-wrap{position:relative;flex:1;max-width:300px;}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:var(--g400);fill:none;stroke-width:2;pointer-events:none;}
.search-wrap input{width:100%;background:var(--g50);border:1px solid var(--border);border-radius:20px;padding:7px 14px 7px 32px;font-family:var(--font);font-size:.78rem;color:var(--text);outline:none;}
.search-wrap input:focus{border-color:var(--brand-md);background:var(--white);box-shadow:0 0 0 3px rgba(79,70,229,.08);}
.search-wrap input::placeholder{color:var(--g400);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.tb-stat{display:flex;flex-direction:column;align-items:flex-end;padding:0 12px;border-right:1px solid var(--border);}
.tb-stat-val{font-size:.9rem;font-weight:700;color:var(--text);}
.tb-stat-lbl{font-size:.58rem;font-weight:600;color:var(--g400);text-transform:uppercase;letter-spacing:.08em;}
.sync-badge{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:20px;background:var(--g50);border:1px solid var(--border);}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--emerald);}
.sync-dot.syncing{background:var(--amber);animation:pulse .8s infinite;}
.sync-dot.error{background:var(--rose);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sync-txt{font-size:.65rem;font-weight:500;color:var(--text2);}
.btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--font);font-size:.75rem;font-weight:600;padding:7px 14px;border-radius:var(--r6);border:1px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-primary{background:var(--brand);color:#fff;border-color:var(--brand);}
.btn-primary:hover{background:var(--brand-dk);}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;}
.btn-outline{background:var(--white);color:var(--text2);border-color:var(--border);}
.btn-outline:hover{background:var(--g50);border-color:var(--border2);}
.btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:16px 20px 0;}
.stat-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r12);padding:16px 18px;display:flex;align-items:center;gap:14px;box-shadow:var(--sh1);}
.stat-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.stat-icon svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:2;}
.si-brand{background:var(--brand-lt);color:var(--brand);}
.si-teal{background:var(--teal-lt);color:var(--teal);}
.si-emerald{background:var(--emerald-lt);color:var(--emerald);}
.si-amber{background:var(--amber-lt);color:var(--amber);}
.stat-val{font-size:1.6rem;font-weight:800;color:var(--text);line-height:1;}
.stat-lbl{font-size:.65rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-top:2px;}

/* LAYOUT */
.app-body{display:flex;padding:16px 0 40px;}

/* SIDEBAR */
.sidebar{width:195px;flex-shrink:0;padding:0 0 0 20px;position:sticky;top:54px;height:calc(100vh - 54px);overflow-y:auto;}
.sidebar::-webkit-scrollbar{width:3px;}
.sidebar::-webkit-scrollbar-thumb{background:var(--g200);}
.sb-title{font-size:.62rem;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.12em;padding:0 8px 10px;margin-top:4px;border-bottom:1px solid var(--border);}
.cli-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:var(--r6);cursor:pointer;transition:all .15s;margin-bottom:1px;position:relative;}
.cli-item:hover{background:var(--g100);}
.cli-item.active{background:var(--brand-lt);}
.cli-item.active::before{content:'';position:absolute;left:0;top:15%;bottom:15%;width:3px;background:var(--brand);border-radius:0 3px 3px 0;}
.cli-avatar{width:26px;height:26px;border-radius:7px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:800;color:#fff;}
.cli-info{flex:1;min-width:0;}
.cli-name{font-size:.72rem;font-weight:600;color:var(--g700);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cli-item.active .cli-name{color:var(--brand-dk);}
.cli-pct{font-size:.6rem;font-weight:700;color:var(--g400);}
.cli-item.active .cli-pct{color:var(--brand);}
.cli-bar{height:2px;background:var(--g200);border-radius:1px;margin-top:3px;overflow:hidden;}
.cli-bar-fill{height:100%;border-radius:1px;transition:width .4s;}

/* CONTENT */
.content{flex:1;min-width:0;padding:0 20px;}

/* HERO */
.hero{background:var(--white);border:1px solid var(--border);border-radius:var(--r16);padding:20px 22px;margin-bottom:14px;box-shadow:var(--sh1);}
.hero-top{display:flex;align-items:center;gap:14px;margin-bottom:14px;}
.hero-avatar{width:50px;height:50px;border-radius:var(--r12);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:1.15rem;font-weight:800;color:#fff;box-shadow:var(--sh2);}
.hero-title{flex:1;min-width:0;}
.hero-name{font-size:1.2rem;font-weight:800;color:var(--g900);letter-spacing:-.02em;margin-bottom:5px;}
.hero-chips{display:flex;gap:6px;flex-wrap:wrap;}
.chip{display:inline-flex;align-items:center;font-size:.63rem;font-weight:600;padding:3px 9px;border-radius:20px;}
.chip-blue{background:var(--brand-lt);color:var(--brand);}
.chip-teal{background:var(--teal-lt);color:var(--teal);}
.chip-violet{background:var(--violet-lt);color:var(--violet);}
.hero-actions{display:flex;gap:8px;align-items:center;flex-shrink:0;}
.onedrive-link{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;font-weight:600;color:var(--teal);padding:6px 12px;border-radius:var(--r6);border:1px solid #a5f3fc;background:var(--teal-lt);text-decoration:none;}
.onedrive-link:hover{background:#cffafe;}
.onedrive-input{font-size:.72rem;padding:7px 12px;border:1px solid var(--border);border-radius:var(--r6);background:var(--g50);color:var(--text);outline:none;width:250px;font-family:var(--font);}
.onedrive-input:focus{border-color:var(--teal);background:var(--white);}
.save-hero-btn{background:var(--brand);color:#fff;border-color:var(--brand);}
.save-hero-btn:hover{background:var(--brand-dk);}
.save-hero-btn.saving{background:var(--teal);border-color:var(--teal);}
.save-hero-btn.saved{background:var(--emerald);border-color:var(--emerald);}
.save-hero-btn.error{background:var(--rose);border-color:var(--rose);}
.hero-bottom{display:flex;align-items:center;gap:14px;padding-top:14px;border-top:1px solid var(--g100);}
.prog-wrap{flex:1;display:flex;align-items:center;gap:10px;}
.prog-lbl{font-size:.7rem;font-weight:600;color:var(--text2);white-space:nowrap;}
.prog-track{flex:1;height:8px;background:var(--g100);border-radius:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--brand),var(--brand-md));transition:width .5s;}
.prog-pct{font-size:.82rem;font-weight:800;color:var(--brand);min-width:36px;text-align:right;}

/* PROYECTO */
.proj-card{background:var(--white);border:1px solid var(--border);border-radius:var(--r12);margin-bottom:10px;box-shadow:var(--sh1);overflow:hidden;transition:box-shadow .2s;}
.proj-card:hover{box-shadow:var(--sh2);}
.proj-card.open{border-color:var(--brand-md);}
.proj-head{padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s;}
.proj-head:hover{background:var(--g50);}
.proj-stripe{width:4px;height:38px;border-radius:3px;background:linear-gradient(180deg,var(--brand),var(--brand-md));flex-shrink:0;}
.proj-info{flex:1;min-width:0;}
.proj-name{font-size:.92rem;font-weight:700;color:var(--g900);border:1px solid transparent;border-radius:4px;outline:none;background:transparent;width:100%;font-family:var(--font);padding:2px 4px;line-height:1.4;word-break:break-word;}
.proj-name:hover{border-color:var(--border);}
.proj-name:focus{background:var(--brand-lt);border-color:var(--brand-md);}
.proj-meta{display:flex;gap:10px;margin-top:3px;}
.proj-meta span{font-size:.63rem;color:var(--g400);font-weight:500;}
.proj-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:auto;}
.proj-mini-bar{width:80px;height:5px;background:var(--g100);border-radius:3px;overflow:hidden;}
.proj-mini-fill{height:100%;background:var(--brand);border-radius:3px;transition:width .4s;}
.proj-mini-pct{font-size:.75rem;font-weight:800;color:var(--brand);min-width:30px;text-align:right;}
.icon-btn{width:28px;height:28px;border-radius:var(--r6);border:none;background:transparent;cursor:pointer;color:var(--g400);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.icon-btn:hover{background:var(--rose-lt);color:var(--rose);}
.icon-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.chev-btn{width:28px;height:28px;border-radius:var(--r6);border:none;background:transparent;cursor:pointer;color:var(--g400);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.chev-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2.5;transition:transform .2s;}
.proj-card.open .chev-btn svg{transform:rotate(180deg);}
.proj-body{display:none;border-top:1px solid var(--border);}
.proj-card.open .proj-body{display:block;}
.proj-footer{padding:10px 16px;background:var(--g50);border-top:1px dashed var(--border);}

/* SERVICIO */
.serv-block{border-bottom:1px solid var(--border);}
.serv-block:last-child{border-bottom:none;}
.serv-head{padding:11px 16px 11px 20px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s;}
.serv-head:hover{background:var(--g50);}
.serv-bar{width:3px;height:22px;border-radius:2px;background:var(--teal);flex-shrink:0;}
.serv-name{font-size:.8rem;font-weight:600;color:var(--g700);border:1px solid transparent;border-radius:4px;outline:none;background:transparent;font-family:var(--font);padding:2px 4px;line-height:1.4;word-break:break-word;flex:1;min-width:0;width:100%;}
.serv-name:hover{border-color:var(--border);}
.serv-name:focus{background:var(--teal-lt);border-color:var(--teal);}
.serv-mini-bar{width:70px;height:4px;background:var(--g100);border-radius:2px;overflow:hidden;flex-shrink:0;}
.serv-mini-fill{height:100%;background:var(--teal);border-radius:2px;transition:width .4s;}
.serv-pct{font-size:.72rem;font-weight:800;color:var(--teal);min-width:28px;text-align:right;flex-shrink:0;}
.s-chev-btn{width:24px;height:24px;border-radius:4px;border:none;background:transparent;cursor:pointer;color:var(--g400);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.s-chev-btn svg{width:12px;height:12px;stroke:currentColor;fill:none;stroke-width:2.5;transition:transform .2s;}
.serv-block.open .s-chev-btn svg{transform:rotate(180deg);}
.serv-body{display:none;background:var(--g50);}
.serv-block.open .serv-body{display:block;}

/* AVANCE EDITOR */
.av-editor{display:flex;align-items:center;gap:10px;padding:10px 20px;border-bottom:1px solid var(--border);background:var(--white);}
.av-lbl{font-size:.62rem;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;white-space:nowrap;}
.av-slider{flex:1;accent-color:var(--teal);cursor:pointer;}
.av-num{width:54px;background:var(--white);border:1px solid var(--border);border-radius:var(--r6);color:var(--teal);font-size:.8rem;font-weight:800;padding:4px 6px;text-align:center;outline:none;font-family:var(--font);}
.av-num:focus{border-color:var(--teal);}
.av-unit{font-size:.68rem;color:var(--g400);font-weight:600;}

/* ACTIVIDADES */
.acts-list{display:flex;flex-direction:column;}
.act-item{display:flex;border-bottom:1px solid var(--border);background:var(--white);}
.act-item:last-child{border-bottom:none;}
.act-num{width:38px;flex-shrink:0;display:flex;align-items:flex-start;justify-content:center;padding-top:16px;font-size:.65rem;font-weight:700;color:var(--g400);background:var(--g50);border-right:1px solid var(--border);}
.act-body{flex:1;min-width:0;padding:14px 18px;}
.act-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:12px;}
.act-desc-wrap{flex:1;min-width:0;}
.act-textarea{width:100%;background:transparent;border:1px solid transparent;border-radius:5px;outline:none;font-family:var(--font);font-size:.82rem;color:var(--text);resize:vertical;min-height:48px;padding:4px 6px;line-height:1.5;word-break:break-word;transition:all .15s;}
.act-textarea:hover{border-color:var(--border);}
.act-textarea:focus{background:var(--white);border-color:var(--brand-md);box-shadow:0 0 0 2px rgba(79,70,229,.07);}
.periodic-badge{display:inline-flex;align-items:center;font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:20px;background:var(--violet-lt);color:var(--violet);margin-top:4px;}
.del-btn{width:30px;height:30px;border-radius:var(--r6);border:none;background:transparent;cursor:pointer;color:var(--g400);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.del-btn:hover{background:var(--rose-lt);color:var(--rose);}
.del-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}
.act-fields{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.act-field{display:flex;flex-direction:column;gap:5px;}
.act-field.full{grid-column:1/-1;}
.field-lbl{font-size:.6rem;font-weight:700;color:var(--g400);text-transform:uppercase;letter-spacing:.08em;}
.field-input{background:var(--g50);border:1px solid var(--border);border-radius:var(--r6);color:var(--text);font-family:var(--font);font-size:.78rem;padding:7px 10px;outline:none;transition:all .15s;width:100%;}
.field-input:focus{background:var(--white);border-color:var(--brand-md);box-shadow:0 0 0 2px rgba(79,70,229,.07);}
.field-input-sm{width:70px;text-align:center;}
.field-select{background:var(--g50);border:1px solid var(--border);border-radius:var(--r6);color:var(--text);font-family:var(--font);font-size:.78rem;padding:7px 10px;outline:none;cursor:pointer;width:100%;-webkit-appearance:none;}
.field-select:focus{border-color:var(--brand-md);}
.estado-select{font-size:.72rem;font-weight:600;padding:6px 10px;border-radius:20px;border:none;outline:none;cursor:pointer;font-family:var(--font);-webkit-appearance:none;width:100%;}
.es-p{background:var(--amber-lt);color:var(--amber);}
.es-e{background:var(--brand-lt);color:var(--brand);}
.es-t{background:var(--emerald-lt);color:var(--emerald);}
.obs-textarea{width:100%;background:var(--g50);border:1px solid var(--border);border-radius:var(--r6);color:var(--text);font-family:var(--font);font-size:.78rem;padding:7px 10px;outline:none;resize:vertical;min-height:56px;line-height:1.5;transition:all .15s;}
.obs-textarea:focus{background:var(--white);border-color:var(--brand-md);}

/* MESES TRACKER */
.meses-tracker{background:linear-gradient(135deg,rgba(124,58,237,.06),rgba(79,70,229,.04));border:1px solid rgba(124,58,237,.18);border-radius:var(--r8);padding:12px 14px;margin-top:12px;}
.meses-title{font-size:.62rem;font-weight:700;color:var(--violet);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;}
.meses-chips{display:flex;flex-wrap:wrap;gap:6px;}
.mes-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:8px;cursor:pointer;user-select:none;background:var(--white);border:1.5px solid var(--g200);transition:all .15s;}
.mes-chip:hover{border-color:var(--violet);background:var(--violet-lt);}
.mes-chip.done{background:var(--emerald-lt);border-color:var(--emerald);}
.mes-chip input[type=checkbox]{width:13px;height:13px;accent-color:var(--violet);cursor:pointer;flex-shrink:0;}
.mes-chip.done input[type=checkbox]{accent-color:var(--emerald);}
.mes-chip-lbl{font-size:.68rem;font-weight:700;color:var(--g600);}
.mes-chip.done .mes-chip-lbl{color:var(--emerald);text-decoration:line-through;}

/* FOOTER BUTTONS */
.serv-footer{padding:8px 20px;border-top:1px dashed var(--border);}
.proj-footer{padding:10px 16px;background:var(--g50);border-top:1px dashed var(--border);}
.add-btn{display:inline-flex;align-items:center;gap:5px;font-family:var(--font);font-size:.72rem;font-weight:600;padding:5px 12px;border-radius:var(--r6);cursor:pointer;border:1px dashed var(--border2);background:transparent;color:var(--text2);transition:all .15s;}
.add-btn:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-lt);}
.add-btn.teal:hover{border-color:var(--teal);color:var(--teal);background:var(--teal-lt);}
.add-btn svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5;}

/* CONFIG BANNER */
#config-banner{background:var(--rose-lt);border:1px solid #fecdd3;border-left:4px solid var(--rose);border-radius:var(--r8);margin:12px 20px;padding:14px 18px;display:none;}
#config-banner.show{display:block;}
.cb-title{font-size:.85rem;font-weight:700;color:var(--rose);margin-bottom:5px;}
.cb-body{font-size:.73rem;color:#9f1239;line-height:1.6;}
.cb-body code{background:#ffe4e6;padding:1px 5px;border-radius:3px;font-family:monospace;}
.cb-row{display:flex;gap:8px;margin-top:10px;}
.cb-input{flex:1;background:var(--white);border:1px solid #fca5a5;border-radius:var(--r6);font-family:var(--font);font-size:.78rem;padding:8px 12px;outline:none;color:var(--text);}
.cb-btn{font-size:.72rem;font-weight:600;padding:8px 16px;border-radius:var(--r6);border:none;background:var(--rose);color:#fff;cursor:pointer;}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(15,23,42,.5);backdrop-filter:blur(3px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-bg.off{display:none;}
.modal{background:var(--white);border-radius:var(--r16);padding:26px;width:100%;max-width:460px;box-shadow:var(--sh3);animation:min .2s ease;}
@keyframes min{from{opacity:0;transform:scale(.96) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-head{display:flex;align-items:center;gap:10px;margin-bottom:18px;}
.modal-ico{width:34px;height:34px;border-radius:9px;background:var(--brand-lt);display:flex;align-items:center;justify-content:center;}
.modal-ico svg{width:17px;height:17px;stroke:var(--brand);fill:none;stroke-width:2;}
.modal-ttl{font-size:.95rem;font-weight:700;color:var(--g900);}
.modal-field{margin-bottom:12px;}
.modal-lbl{font-size:.65rem;font-weight:700;color:var(--text2);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
.modal-input{width:100%;background:var(--g50);border:1px solid var(--border);border-radius:var(--r6);color:var(--text);font-family:var(--font);font-size:.82rem;padding:9px 12px;outline:none;}
.modal-input:focus{background:var(--white);border-color:var(--brand-md);box-shadow:0 0 0 3px rgba(79,70,229,.08);}
.modal-textarea{resize:vertical;min-height:80px;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.modal-cancel{background:var(--g100);color:var(--text2);border:none;padding:8px 16px;border-radius:var(--r6);font-family:var(--font);font-size:.78rem;font-weight:600;cursor:pointer;}
.modal-cancel:hover{background:var(--g200);}
.modal-ok{background:var(--brand);color:#fff;border:none;padding:8px 18px;border-radius:var(--r6);font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer;}
.modal-ok:hover{background:var(--brand-dk);}

/* TOAST */
#toast{position:fixed;bottom:20px;right:20px;background:var(--g900);color:#fff;border-radius:var(--r8);padding:10px 16px;font-size:.78rem;font-weight:600;opacity:0;transform:translateY(8px);transition:all .22s;z-index:999;pointer-events:none;box-shadow:var(--sh3);}
#toast.on{opacity:1;transform:translateY(0);}
#toast.err{background:var(--rose);}

/* SCROLLBAR */
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--g200);border-radius:3px;}
::-webkit-scrollbar-thumb:hover{background:var(--g300);}
</style>

// ── STATE ────────────────────────────────────────────────────────
let DB = [];
let activeId = null;
let idN = 2000;
function uid(p){ return p+'_'+(++idN)+'_'+Date.now(); }

// ── SYNC ─────────────────────────────────────────────────────────
function getUrl(){ return SCRIPT_URL || localStorage.getItem(STORE_KEY) || ''; }
function connectUrl(){
  const v = document.getElementById('url-input').value.trim();
  if(!v.startsWith('https://script.google.com')){ alert('URL inválida'); return; }
  localStorage.setItem(STORE_KEY, v);
  document.getElementById('config-banner').classList.remove('show');
  load();
}
function setSS(state, msg){
  const d=document.getElementById('sync-dot'), l=document.getElementById('sync-lbl');
  d.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':'');
  l.textContent=msg;
}
function setLM(m){ document.getElementById('ld-msg').textContent=m; }
function hideLoader(){ const l=document.getElementById('loader'); l.classList.add('off'); setTimeout(()=>l.style.display='none',500); }

async function load(){
  try {
    const url = getUrl();
    setLM('Conectando…');
    if(!url){
      DB = JSON.parse(JSON.stringify(INITIAL_DATA));
      boot(); hideLoader();
      document.getElementById('config-banner').classList.add('show');
      setSS('error','Sin configurar');
      return;
    }
    try {
      setLM('Cargando datos…');
      const r = await fetch(url, {method:'GET', redirect:'follow'});
      const d = await r.json();
      if(d.status==='ok' && d.empresas && d.empresas.length>0){
        DB = d.empresas; setSS('ok','Sincronizado');
      } else {
        DB = JSON.parse(JSON.stringify(INITIAL_DATA));
        setSS('ok','Datos iniciales');
        await push();
      }
    } catch(e){
      DB = JSON.parse(JSON.stringify(INITIAL_DATA));
      setSS('error','Sin conexión — local');
      toast('Sin conexión con Google Sheets', true);
    }
    boot(); hideLoader();
  } catch(fatal){
    console.error(fatal);
    hideLoader();
    document.getElementById('content').innerHTML =
      '<div style="padding:24px;color:var(--rose);background:var(--rose-lt);border-radius:12px;margin:16px">'+
      '<b>Error al iniciar.</b> Detalle: '+fatal.message+'</div>';
  }
}
setTimeout(()=>{ try{ hideLoader(); }catch(e){} }, 8000);

async function push(){
  const url=getUrl(); if(!url) return false;
  setSS('syncing','Guardando…');
  try {
    const r = await fetch(url,{method:'POST',redirect:'follow',headers:{'Content-Type':'text/plain'},body:JSON.stringify({empresas:DB})});
    const d = await r.json();
    if(d.status==='ok'){ setSS('ok','Guardado · '+new Date().toLocaleTimeString('es-PE',{hour:'2-digit',minute:'2-digit'})); return true; }
    setSS('error','Error'); return false;
  } catch(e){ setSS('error','Sin conexión'); return false; }
}

async function saveAll(){
  const btn=document.getElementById('save-btn'); btn.textContent='Guardando…'; btn.disabled=true;
  const ok=await push();
  btn.innerHTML='<svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>Guardar Todo';
  btn.disabled=false;
  toast(ok?'✓ Guardado en Google Sheets':'Sin conexión', !ok);
}

async function saveEmpresa(eid){
  const btn=document.getElementById('seb-'+eid);
  if(btn){ btn.textContent='Guardando…'; btn.className='btn save-hero-btn saving'; }
  const ok=await push();
  if(btn){ btn.textContent=ok?'✓ Guardado':'✗ Error'; btn.className='btn save-hero-btn '+(ok?'saved':'error'); }
  toast(ok?'✓ Guardado':'Error de conexión', !ok);
  setTimeout(()=>{ if(btn){ btn.textContent='Guardar'; btn.className='btn save-hero-btn'; }},2500);
}

// ── HELPERS ──────────────────────────────────────────────────────
function pA(p){ if(!p.servicios||!p.servicios.length)return 0; const v=p.servicios.map(s=>Number(s.avance)||0); return Math.round(v.reduce((a,b)=>a+b,0)/v.length); }
function eA(emp){ if(!emp.proyectos||!emp.proyectos.length)return 0; const v=emp.proyectos.map(p=>pA(p)); return Math.round(v.reduce((a,b)=>a+b,0)/v.length); }
function allActs(){ return DB.flatMap(e=>e.proyectos.flatMap(p=>p.servicios.flatMap(s=>s.actividades))); }
function escH(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function navCol(pct){ return pct>=80?'var(--emerald)':pct>=40?'var(--teal)':'var(--brand)'; }
function eClass(e){ return e==='Terminado'?'es-t':e==='En progreso'?'es-e':'es-p'; }
const COLORS=['#4f46e5','#0891b2','#059669','#d97706','#7c3aed','#e11d48','#0f766e','#9333ea','#c2410c','#0369a1','#15803d'];

// ── BOOT ─────────────────────────────────────────────────────────
function boot(){
  updateKPIs();
  renderSidebar();
  if(!activeId && DB.length) activeId=DB[0].id;
  renderContent();
}

function updateKPIs(){
  const totalActs=allActs().length;
  const totalProjs=DB.reduce((s,e)=>s+e.proyectos.length,0);
  document.getElementById('kpi-emps').textContent=DB.length;
  document.getElementById('kpi-projs').textContent=totalProjs;
  document.getElementById('kpi-done').textContent=allActs().filter(a=>a.estado==='Terminado').length;
  document.getElementById('kpi-pend').textContent=allActs().filter(a=>a.estado==='Pendiente').length;
  document.getElementById('nav-emps').textContent=DB.length;
  document.getElementById('nav-acts').textContent=totalActs;
}

function renderSidebar(){
  const q=document.getElementById('search').value.toLowerCase();
  const filtered=DB.filter(e=>!q||e.nombre.toLowerCase().includes(q));
  document.getElementById('sb-nav').innerHTML=filtered.map((emp,i)=>{
    const pct=eA(emp);
    const bg=COLORS[DB.indexOf(emp)%COLORS.length];
    const init=emp.nombre.split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
    const fc=navCol(pct);
    return `<div class="cli-item${emp.id===activeId?' active':''}" onclick="selectEmp('${emp.id}')">
      <div class="cli-avatar" style="background:${bg}">${init}</div>
      <div class="cli-info">
        <div class="cli-name">${emp.nombre}</div>
        <div class="cli-bar"><div class="cli-bar-fill" style="width:${pct}%;background:${fc}"></div></div>
      </div>
      <span class="cli-pct">${pct}%</span>
    </div>`;
  }).join('');
}

function selectEmp(id){ activeId=id; renderSidebar(); renderContent(); }

function renderContent(){
  const content=document.getElementById('content');

  const ts=emp.proyectos.reduce((s,p)=>s+p.servicios.length,0);

  <div class="hero-top">

    <div class="hero-title">
      <div class="hero-name">${emp.nombre}</div>
      <div class="hero-chips">
        <span class="chip chip-blue">${tp} proyecto${tp!==1?'s':''}</span>
        <span class="chip chip-teal">${ts} servicio${ts!==1?'s':''}</span>
        <span class="chip chip-violet">${ta} actividad${ta!==1?'es':''}</span>
      </div>
    </div>
    <div class="hero-actions">${od}<button class="btn save-hero-btn" id="seb-${emp.id}" onclick="saveEmpresa('${emp.id}')">Guardar</button></div>
  </div>
  <div class="hero-bottom">
    <div class="prog-wrap">
      <span class="prog-lbl">Avance general</span>
      <div class="prog-track"><div class="prog-fill" id="pf-${emp.id}" style="width:${pct}%"></div></div>
      <span class="prog-pct" id="pp-${emp.id}">${pct}%</span>
    </div>
    <button class="btn btn-outline" style="font-size:.72rem;padding:6px 12px" onclick="addProj('${emp.id}')">
      <svg viewBox="0 0 24 24" style="width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nuevo proyecto

  </div>
</div>
<div id="projs-${emp.id}">${projs}</div>`;

    </div>

  const pct=Number(s.avance)||0;

  return `<div class="serv-block" id="serv-${s.id}">

      <input class="serv-name" type="text" value="${escH(s.nombre)}" onclick="event.stopPropagation()" onchange="upServName('${emp.id}','${p.id}','${s.id}',this.value)" placeholder="Nombre del servicio">
    </div>
    <div class="serv-mini-bar"><div class="serv-mini-fill" id="smf-${s.id}" style="width:${pct}%"></div></div>

    <button class="icon-btn" onclick="event.stopPropagation();delServ('${emp.id}','${p.id}','${s.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>

    <div class="serv-footer">
      <button class="add-btn" onclick="addAct('${emp.id}','${p.id}','${s.id}')"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Agregar actividad</button>
    </div>
  </div>

function renderMeses(eid,pid,sid,a){
  if(a.tipo!=='periodica')return '';
  const n=Math.max(1,parseInt(a.meses)||1);
  if(!a.mesesCheck)a.mesesCheck=[];
  const chips=Array.from({length:n},(_,i)=>{
    const done=a.mesesCheck[i]||false;
    return `<label class="mes-chip${done?' done':''}" id="mc-${a.id}-${i}" onclick="toggleMes('${eid}','${pid}','${sid}','${a.id}',${i})">
      <input type="checkbox" ${done?'checked':''} onclick="event.stopPropagation();toggleMes('${eid}','${pid}','${sid}','${a.id}',${i})">
      <span class="mes-chip-lbl">M${i+1}</span>
    </label>`;
  }).join('');
  return `<div class="meses-tracker" id="mt-${a.id}">
    <div class="meses-title">📅 Seguimiento mensual — ${n} mes${n!==1?'es':''}</div>
    <div class="meses-chips" id="mcs-${a.id}">${chips}</div>
  </div>`;
}

function renderAct(emp,p,s,a){
  const idx=s.actividades.findIndex(x=>x.id===a.id)+1;
  const ec=eClass(a.estado);
  const pb=a.tipo==='periodica'?'<span class="periodic-badge">Periódica</span>':'';
  const finF=a.tipo==='periodica'
    ? `<div style="display:flex;align-items:center;gap:6px"><input type="number" class="field-input field-input-sm" min="1" max="60" value="${a.meses||1}" onchange="upActMeses('${emp.id}','${p.id}','${s.id}','${a.id}',this.value)"><span style="font-size:.72rem;color:var(--g400)">meses</span></div>`
    : `<input type="date" class="field-input" value="${a.fechaFin||''}" onchange="upAct('${emp.id}','${p.id}','${s.id}','${a.id}','fechaFin',this.value)">`;
  return `<div class="act-item" id="act-${a.id}">
  <div class="act-num">${idx}</div>
  <div class="act-body">
    <div class="act-top">
      <div class="act-desc-wrap">
        <textarea class="act-textarea" rows="2" onchange="upAct('${emp.id}','${p.id}','${s.id}','${a.id}','desc',this.value)">${escH(a.desc)}</textarea>
        ${pb}
      </div>
      <button class="del-btn" onclick="delAct('${emp.id}','${p.id}','${s.id}','${a.id}')"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg></button>
    </div>
    <div class="act-fields">
      <div class="act-field">
        <span class="field-lbl">Tipo</span>
        <select class="field-select" onchange="upActTipo('${emp.id}','${p.id}','${s.id}','${a.id}',this.value)">
          <option value="puntual"${a.tipo==='puntual'?' selected':''}>Puntual</option>
          <option value="periodica"${a.tipo==='periodica'?' selected':''}>Periódica</option>
        </select>
      </div>
      <div class="act-field">
        <span class="field-lbl">Responsable</span>
        <input type="text" class="field-input" value="${escH(a.responsable)}" onchange="upAct('${emp.id}','${p.id}','${s.id}','${a.id}','responsable',this.value)" placeholder="Nombre">
      </div>
      <div class="act-field">
        <span class="field-lbl">Fecha inicio</span>
        <input type="date" class="field-input" value="${a.fechaInicio||''}" onchange="upAct('${emp.id}','${p.id}','${s.id}','${a.id}','fechaInicio',this.value)">
      </div>
      <div class="act-field" id="fc-${a.id}">
        <span class="field-lbl">${a.tipo==='periodica'?'Duración':'Fecha fin'}</span>

          <option value="Pendiente"${a.estado==='Pendiente'?' selected':''}>Pendiente</option>
          <option value="En progreso"${a.estado==='En progreso'?' selected':''}>En progreso</option>
          <option value="Terminado"${a.estado==='Terminado'?' selected':''}>Terminado</option>
        </select>
      </div>
      <div class="act-field full">

        <textarea class="obs-textarea" onchange="upAct('${emp.id}','${p.id}','${s.id}','${a.id}','obs',this.value)" placeholder="Notas adicionales…">${escH(a.obs||'')}</textarea>

// ── TOGGLES ──────────────────────────────────────────────────────
function toggleProj(id){ document.getElementById('proj-'+id)?.classList.toggle('open'); }
function toggleServ(id){ document.getElementById('serv-'+id)?.classList.toggle('open'); }

// ── UPDATE HELPERS ────────────────────────────────────────────────
function getObj(eid,pid,sid){
  const emp=DB.find(e=>e.id===eid);
  const p=emp?.proyectos.find(p=>p.id===pid);
  const s=p?.servicios.find(s=>s.id===sid);
  return{emp,p,s};
}
function upField(eid,field,val){ const emp=DB.find(e=>e.id===eid); if(emp)emp[field]=val; }
function upProjName(eid,pid,val){ const{p}=getObj(eid,pid,null); if(p)p.nombre=val; }
function upServName(eid,pid,sid,val){ const{s}=getObj(eid,pid,sid); if(s)s.nombre=val; }
function upAct(eid,pid,sid,aid,field,val){
  const{s}=getObj(eid,pid,sid);
  const a=s?.actividades.find(a=>a.id===aid);
  if(a) a[field]=val;
}
function upActEstado(eid,pid,sid,aid,sel){
  const{s}=getObj(eid,pid,sid);
  const a=s?.actividades.find(a=>a.id===aid);
  if(a){ a.estado=sel.value; sel.className='estado-select '+eClass(sel.value); }
  updateKPIs();
}
function upActTipo(eid,pid,sid,aid,val){
  const{emp,p,s}=getObj(eid,pid,sid);
  const a=s?.actividades.find(a=>a.id===aid);
  if(!a)return;
  a.tipo=val;
  const cell=document.getElementById('fc-'+aid);
  if(cell){
    const lbl=cell.querySelector('.field-lbl');
    if(val==='periodica'){
      if(!a.mesesCheck)a.mesesCheck=Array(a.meses||1).fill(false);
      if(lbl)lbl.textContent='Duración';
      const old=cell.querySelector('input,div');if(old)old.remove();
      const w=document.createElement('div');
      w.style.cssText='display:flex;align-items:center;gap:6px';
      w.innerHTML=`<input type="number" class="field-input field-input-sm" min="1" max="60" value="${a.meses||1}" onchange="upActMeses('${eid}','${pid}','${sid}','${aid}',this.value)"><span style="font-size:.72rem;color:var(--g400)">meses</span>`;
      cell.appendChild(w);
      const dw=document.getElementById('act-'+aid)?.querySelector('.act-desc-wrap');
      if(dw&&!dw.querySelector('.periodic-badge')){ const b=document.createElement('span'); b.className='periodic-badge'; b.textContent='Periódica'; dw.appendChild(b); }
      const ab=document.getElementById('act-'+aid)?.querySelector('.act-body');
      if(ab&&!document.getElementById('mt-'+aid)){ const t=document.createElement('div'); t.innerHTML=renderMeses(eid,pid,sid,a); if(t.firstElementChild)ab.appendChild(t.firstElementChild); }
    } else {
      if(lbl)lbl.textContent='Fecha fin';
      Array.from(cell.children).forEach(c=>{ if(!c.classList.contains('field-lbl'))c.remove(); });
      const inp=document.createElement('input'); inp.type='date'; inp.className='field-input'; inp.value=a.fechaFin||'';
      inp.onchange=e=>upAct(eid,pid,sid,aid,'fechaFin',e.target.value);
      cell.appendChild(inp);
      document.getElementById('act-'+aid)?.querySelector('.periodic-badge')?.remove();
      document.getElementById('mt-'+aid)?.remove();
    }
  }
}
function upActMeses(eid,pid,sid,aid,val){
  const{s}=getObj(eid,pid,sid);
  const a=s?.actividades.find(a=>a.id===aid);
  if(!a)return;
  const n=Math.max(1,parseInt(val)||1);
  a.meses=n;
  if(!a.mesesCheck)a.mesesCheck=[];
  a.mesesCheck.length=n;
  for(let i=0;i<n;i++)if(a.mesesCheck[i]===undefined)a.mesesCheck[i]=false;
  const old=document.getElementById('mt-'+aid);
  const ab=document.getElementById('act-'+aid)?.querySelector('.act-body');
  if(ab){
    const t=document.createElement('div'); t.innerHTML=renderMeses(eid,pid,sid,a);
    if(old)old.replaceWith(t.firstElementChild);
    else if(t.firstElementChild)ab.appendChild(t.firstElementChild);
  }
}
function toggleMes(eid,pid,sid,aid,idx){
  const{s}=getObj(eid,pid,sid);
  const a=s?.actividades.find(a=>a.id===aid);
  if(!a)return;
  if(!a.mesesCheck)a.mesesCheck=[];
  a.mesesCheck[idx]=!a.mesesCheck[idx];
  const chip=document.getElementById(`mc-${aid}-${idx}`);
  if(chip){ const cb=chip.querySelector('input[type=checkbox]'); if(cb)cb.checked=a.mesesCheck[idx]; chip.classList.toggle('done',a.mesesCheck[idx]); }
}
function syncAv(eid,pid,sid,val){
  const v=Math.min(100,Math.max(0,Number(val)||0));
  const{emp,p,s}=getObj(eid,pid,sid);
  if(s)s.avance=v;
  const numEl=document.getElementById('avn-'+sid);
  if(numEl)numEl.value=v;
  const smf=document.getElementById('smf-'+sid); if(smf)smf.style.width=v+'%';
  const sp=document.getElementById('sp-'+sid); if(sp)sp.textContent=v+'%';
  if(p){ const pp=pA(p); const pmf=document.getElementById('pmf-'+p.id); if(pmf)pmf.style.width=pp+'%'; const pmp=document.getElementById('pmp-'+p.id); if(pmp)pmp.textContent=pp+'%'; }
  if(emp){ const ep=eA(emp); const pf=document.getElementById('pf-'+emp.id); if(pf)pf.style.width=ep+'%'; const pp2=document.getElementById('pp-'+emp.id); if(pp2)pp2.textContent=ep+'%';
    const cbl=document.querySelector(`.cli-item[onclick*="${eid}"] .cli-pct`); if(cbl)cbl.textContent=ep+'%';
    const cbf=document.querySelector(`.cli-item[onclick*="${eid}"] .cli-bar-fill`); if(cbf){cbf.style.width=ep+'%';cbf.style.background=navCol(ep);}
  }
  updateKPIs();
}

// ── ADD / DELETE ──────────────────────────────────────────────────
function addAct(eid,pid,sid){
  const{s}=getObj(eid,pid,sid);
  if(!s)return;
  const emp=DB.find(e=>e.id===eid), p=emp.proyectos.find(p=>p.id===pid);
  const a={id:uid('a'),desc:'Nueva actividad',responsable:'',fechaInicio:'',fechaFin:'',tipo:'puntual',meses:1,mesesCheck:[],estado:'Pendiente',obs:''};
  s.actividades.push(a);
  const list=document.getElementById('acts-'+sid);
  if(list){ const d=document.createElement('div'); d.innerHTML=renderAct(emp,p,s,a); list.appendChild(d.firstElementChild); }
  updateKPIs();
}
function delAct(eid,pid,sid,aid){
  if(!confirm('¿Eliminar esta actividad?'))return;
  const{s}=getObj(eid,pid,sid);
  if(!s)return;
  s.actividades=s.actividades.filter(a=>a.id!==aid);
  document.getElementById('act-'+aid)?.remove();
  updateKPIs();
}
function delServ(eid,pid,sid){
  if(!confirm('¿Eliminar este servicio y sus actividades?'))return;
  const{p}=getObj(eid,pid,sid);
  if(!p)return;
  p.servicios=p.servicios.filter(s=>s.id!==sid);
  document.getElementById('serv-'+sid)?.remove();
  updateKPIs();
}
function delProj(eid,pid){
  if(!confirm('¿Eliminar este proyecto?'))return;
  const emp=DB.find(e=>e.id===eid);
  if(!emp)return;
  emp.proyectos=emp.proyectos.filter(p=>p.id!==pid);
  document.getElementById('proj-'+pid)?.remove();
  updateKPIs();
}

// ── MODAL ─────────────────────────────────────────────────────────
let _modalCb=null;
function showModal(title,fields,cb){
  document.getElementById('modal-ttl').textContent=title;
  document.getElementById('modal-body').innerHTML=fields.map(f=>`
    <div class="modal-field">
      <label class="modal-lbl">${f.label}</label>
      ${f.type==='textarea'?`<textarea class="modal-input modal-textarea" id="mf-${f.id}" placeholder="${f.ph||''}"></textarea>`:`<input class="modal-input" type="text" id="mf-${f.id}" placeholder="${f.ph||''}">`}
    </div>`).join('');
  _modalCb=cb;
  document.getElementById('modal-bg').classList.remove('off');
  document.getElementById('modal-ok').onclick=()=>{ const v={}; fields.forEach(f=>v[f.id]=document.getElementById('mf-'+f.id)?.value||''); cb(v); closeModal(); };
  setTimeout(()=>document.querySelector('#modal-body input,#modal-body textarea')?.focus(),100);
}
function closeModal(){ document.getElementById('modal-bg').classList.add('off'); }

function addEmpresa(){
  showModal('Nueva empresa',[{id:'n',label:'Nombre',ph:'Ej: Empresa ABC'}],v=>{
    if(!v.n.trim())return;
    const emp={id:uid('e'),nombre:v.n.trim(),onedrive:'',proyectos:[]};
    DB.push(emp); renderSidebar(); updateKPIs(); selectEmp(emp.id);
  });
}
function addProj(eid){
  showModal('Nuevo proyecto',[{id:'n',label:'Nombre del proyecto',ph:'Ej: Implementación de sistemas'}],v=>{
    if(!v.n.trim())return;
    const emp=DB.find(e=>e.id===eid); if(!emp)return;
    const p={id:uid('p'),nombre:v.n.trim(),servicios:[]}; emp.proyectos.push(p); renderContent();
  });
}
function addServ(eid,pid){
  showModal('Nuevo servicio',[{id:'n',label:'Nombre del servicio',ph:'Ej: Implementación ERP',type:'textarea'}],v=>{
    if(!v.n.trim())return;
    const{p}=getObj(eid,pid,null); if(!p)return;
    const s={id:uid('s'),nombre:v.n.trim(),avance:0,actividades:[]}; p.servicios.push(s); renderContent();
  });
}

// ── TOAST ────────────────────────────────────────────────────────
function toast(msg,err=false){
  const t=document.getElementById('toast'); t.textContent=msg; t.className='on'+(err?' err':'');
  setTimeout(()=>t.className='',2500);
}

// ── SEARCH ───────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',()=>{ renderSidebar(); });

// ── START ────────────────────────────────────────────────────────
load();
</script>
